<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AB Running Loisir — Aviron Bayonnais</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Lora:ital,wght@0,400;0,600;1,400;1,600&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
/* VARIABLES DE COULEURS AVIRON BAYONNAIS */
:root {
  --bg: #F4F6FA;
  --bg2: #EBEEf5;
  --surface: #FFFFFF;
  --surface2: #F0F3FA;
  --border: rgba(30,60,120,0.10);
  --ab-blue: #1B3A6B;
  --ab-blue2: #2351A0;
  --ab-light: #4A7ACC;
  --ab-sky: #7AAEE0;
  --white: #FFFFFF;
  --text: #1A2540;
  --muted: #6B7A9A;
  --ocre: #D4893A;
  --mousse: #4A8A5A;
}

* { margin:0; padding:0; box-sizing:border-box; }
body { background: var(--bg); color: var(--text); font-family: 'Lora', serif; overflow-x: hidden; }

/* HEADER & NAV */
header { background: var(--ab-blue); padding: 2rem 1rem; text-align: center; color: white; }
.logo-container img { height: 60px; margin-bottom: 1rem; }
.nav-tabs { display: flex; justify-content: center; gap: 10px; background: white; padding: 10px; sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--border); }
.tab-btn { padding: 10px 20px; border: none; background: none; font-family: 'Syne', sans-serif; font-weight: 700; cursor: pointer; color: var(--muted); border-radius: 8px; transition: 0.3s; }
.tab-btn.active { background: var(--ab-blue); color: white; }

/* CONTENU */
.container { max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
.section-content { display: none; }
.section-content.active { display: block; }

/* CARTES PLANNING */
.week-card { background: white; border-radius: 16px; padding: 1.5rem; margin-bottom: 2rem; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid var(--border); }
.week-header { border-bottom: 2px solid var(--bg); margin-bottom: 1.5rem; padding-bottom: 1rem; }
.week-badge { background: var(--ab-sky); color: white; padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: 800; font-family: 'Syne'; }
.week-title { font-family: 'Bebas Neue'; font-size: 2rem; color: var(--ab-blue); margin-top: 0.5rem; }

.day-row { display: flex; align-items: center; padding: 1rem; border-radius: 12px; background: var(--bg); margin-bottom: 10px; cursor: pointer; transition: 0.2s; }
.day-row:hover { transform: translateX(5px); background: var(--ab-sky-light); }
.day-name { width: 80px; font-family: 'Syne'; font-weight: 800; color: var(--ab-blue); text-transform: uppercase; }
.day-main { flex-grow: 1; }
.session-name { font-weight: 700; font-size: 1.1rem; }
.tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: 700; margin-top: 5px; margin-right: 5px; font-family: 'Syne'; }
.tag-blue { background: #E3EAF5; color: var(--ab-blue); }
.tag-sky { background: #E3F2FD; color: #1976D2; }
.tag-green { background: #E8F5E9; color: var(--mousse); }

/* MODALE */
.modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:1000; justify-content:center; align-items:center; padding:1rem; }
.modal-content { background:white; padding:2rem; border-radius:20px; max-width:600px; width:100%; position:relative; max-height: 90vh; overflow-y: auto; }
.close-modal { position:absolute; top:15px; right:15px; font-size:1.5rem; cursor:pointer; border:none; background:none; }

/* BIBLIOTHÈQUES */
.grid-biblio { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
@media (max-width: 600px) { .grid-biblio { grid-template-columns: 1fr; } }
.biblio-card { background: white; padding: 1rem; border-radius: 12px; border: 1px solid var(--border); }
</style>

<script src="data.js"></script>

</head>
<body>

<header>
    <div class="logo-container">
        <img src="https://club-avironbayonnais.fr/wp-content/uploads/2022/10/Logo-Aviron-Bayonnais-Couleur.png" alt="Logo AB">
    </div>
    <h1 style="font-family:'Bebas Neue'; font-size: 3rem; letter-spacing: 2px;">RUNNING LOISIR</h1>
    <p style="font-family:'Syne'; opacity: 0.9;">Programmation & Ressources</p>
</header>

<nav class="nav-tabs">
    <button class="tab-btn active" onclick="switchTab('planning')">PROGRAMME</button>
    <button class="tab-btn" onclick="switchTab('renfo')">RENFORCEMENT</button>
    <button class="tab-btn" onclick="switchTab('ppg')">RÉVEIL MATIN</button>
</nav>

<div class="container">
    <div id="planning" class="section-content active">
        <div id="planning-list"></div>
    </div>

    <div id="renfo" class="section-content">
        <h2 style="font-family:'Bebas Neue'; margin-bottom:1rem;">Bibliothèque Renfo</h2>
        <div class="grid-biblio" id="renfo-list"></div>
    </div>

    <div id="ppg" class="section-content">
        <h2 style="font-family:'Bebas Neue'; margin-bottom:1rem;">Routines du Matin</h2>
        <div id="ppg-list"></div>
    </div>
</div>

<div id="modal" class="modal" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <button class="close-modal" onclick="closeModal()">×</button>
        <div id="modal-body"></div>
    </div>
</div>

<script>
// 1. GESTION DES ONGLETS
function switchTab(tabId) {
    document.querySelectorAll('.section-content').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    
    document.getElementById(tabId).classList.add('active');
    event.currentTarget.classList.add('active');
}

// 2. CHARGEMENT DES DONNÉES AU DÉMARRAGE
window.onload = function() {
    if (typeof prog === 'undefined') {
        alert("Erreur: data.js n'est pas trouvé. Vérifiez que les fichiers sont dans le même dossier.");
        return;
    }
    initPlanning();
    initRenfo();
    initPPG();
};

// 3. AFFICHAGE DU PLANNING
function initPlanning() {
    const container = document.getElementById('planning-list');
    container.innerHTML = '';

    prog.forEach(semaine => {
        const div = document.createElement('div');
        div.className = 'week-card';
        let html = `
            <div class="week-header">
                <span class="week-badge">SEMAINE ${semaine.id}</span>
                <h2 class="week-title">${semaine.theme}</h2>
            </div>
            <div class="days-grid">
        `;

        semaine.jours.forEach(j => {
            const ex = exercices.find(e => e.id === j.exId);
            const terrain = terrainLabel[j.terrain] || {icon:'📍', label:j.terrain, cls:'tag-blue'};
            
            html += `
                <div class="day-row" onclick="showExDetail('${j.exId}')">
                    <div class="day-name">${j.nom}</div>
                    <div class="day-main">
                        <div class="session-name">${ex ? ex.titre : 'Repos / Sortie Libre'}</div>
                        <div class="session-tags">
                            <span class="tag ${terrain.cls}">${terrain.icon} ${terrain.label}</span>
                            ${ex ? `<span class="tag tag-blue">⚡ ${ex.intensite}</span>` : ''}
                        </div>
                    </div>
                    <div style="color:var(--ab-light)">→</div>
                </div>
            `;
        });

        html += `</div>`;
        div.innerHTML = html;
        container.appendChild(div);
    });
}

// 4. AFFICHAGE RENFORCEMENT
function initRenfo() {
    const container = document.getElementById('renfo-list');
    // On filtre les exercices de type renfo dans data.js
    const renfos = exercices.filter(e => e.type === 'renfo' || e.id.includes('renfo'));
    
    renfos.forEach(r => {
        container.innerHTML += `
            <div class="biblio-card" onclick="showExDetail('${r.id}')" style="cursor:pointer">
                <h3 style="color:var(--ab-blue)">${r.titre}</h3>
                <p style="font-size:0.8rem; color:var(--muted)">${r.intensite}</p>
            </div>
        `;
    });
}

// 5. AFFICHAGE PPG / RÉVEIL
function initPPG() {
    const container = document.getElementById('ppg-list');
    // Utilise la structure routinesReveil de data.js si elle existe
    if (typeof routinesReveil !== 'undefined') {
        container.innerHTML = `<p style="padding:1rem; background:#fff; border-radius:12px; border:1px solid var(--border);">Consultez vos routines quotidiennes de mobilité et réveil musculaire directement ici.</p>`;
    }
}

// 6. MODALE DE DÉTAIL
function showExDetail(exId) {
    const ex = exercices.find(e => e.id === exId);
    if (!ex) return;

    const modalBody = document.getElementById('modal-body');
    modalBody.innerHTML = `
        <h2 style="font-family:'Bebas Neue'; font-size:2.5rem; color:var(--ab-blue);">${ex.titre}</h2>
        <div style="margin:1rem 0; display:flex; gap:10px;">
            <span class="tag tag-blue">${ex.intensite}</span>
        </div>
        <hr style="border:0; border-top:1px solid var(--border); margin:1rem 0;">
        <div style="line-height:1.6; font-size:1.1rem;">
            ${ex.description.replace(/\n/g, '<br>')}
        </div>
    `;
    document.getElementById('modal').style.display = 'flex';
}

function closeModal() {
    document.getElementById('modal').style.display = 'none';
}
</script>

</body>
</html>
